# CI/CD naar Azure Container Apps.
# Vereiste repo-secrets (Settings → Secrets and variables → Actions):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID  (OIDC, passwordless).
# Handmatig starten kan via Actions → deze workflow → "Run workflow".
name: Build en deploy naar Azure

# Bij elke push naar main: de drie images bouwen, naar de Container Registry
# pushen (getagd met de commit-SHA) en de Container Apps naar die tag updaten.
# Handmatig starten kan ook via de "Run workflow"-knop (workflow_dispatch).
on:
  push:
    branches: [main]
    # Docs- en infra-wijzigingen hoeven geen app-deploy te triggeren.
    # (Infra-as-Code wordt apart uitgerold via `az deployment`, zie infra/main.bicep.)
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'infra/**'
      - 'scripts/**'
  workflow_dispatch:

# Nodig voor passwordless login via OIDC (federated credentials).
permissions:
  id-token: write
  contents: read

# Eén deploy tegelijk per branch; een nieuwe push annuleert een lopende run,
# zodat twee deploys elkaars revisie niet overschrijven.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_RG: rg-pharmadocs
  ACR_NAME: crpharmadocse767d1

jobs:
  # ── 0a) Backend-tests: moeten slagen vóór we bouwen/deployen ──────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Backend-tests (xUnit)
        run: dotnet test backend/PharmaDocs.Tests/PharmaDocs.Tests.csproj --configuration Release

  # ── 0b) AI-service-tests (pytest): chunking, RAG-bericht, veilige degradatie ─
  test-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Afhankelijkheden installeren (runtime + pytest)
        run: pip install -r ai-service/requirements-dev.txt
      - name: AI-service-tests (pytest)
        working-directory: ai-service
        run: python -m pytest -q

  # ── 1) De drie images parallel bouwen en pushen ──────────────────────────
  build-and-push:
    needs: [test, test-ai]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - name: api
            context: backend/PharmaDocs.Api
          - name: ai
            context: ai-service
          - name: web
            context: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Inloggen op Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Inloggen op de Container Registry
        run: az acr login -n "${ACR_NAME}"

      - name: Bouwen en pushen (pharmadocs-${{ matrix.name }})
        run: |
          IMAGE="${ACR_NAME}.azurecr.io/pharmadocs-${{ matrix.name }}"
          docker build -t "${IMAGE}:${GITHUB_SHA}" -t "${IMAGE}:latest" "${{ matrix.context }}"
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"

  # ── 2) De Container Apps naar de nieuwe image-tag updaten ─────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Inloggen op Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Container Apps updaten naar de nieuwe revisie
        run: |
          for svc in ai api web; do
            IMAGE="${ACR_NAME}.azurecr.io/pharmadocs-${svc}:${GITHUB_SHA}"
            echo "▶ pharmadocs-${svc} → ${IMAGE}"
            az containerapp update -g "${AZURE_RG}" -n "pharmadocs-${svc}" --image "${IMAGE}" -o none
          done
