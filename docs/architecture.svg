<svg width="860" height="440" viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="860" height="440" rx="16" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="859" height="439" rx="16" fill="none" stroke="#e6e8ec"/>

  <text x="32" y="40" font-size="15" font-weight="600" fill="#0f172a">PharmaDocs — architectuur</text>
  <text x="32" y="59" font-size="12" fill="#64748b">De .NET-backend is de orchestrator en enige poort naar de front-end; de Python-service doet uitsluitend het AI-werk.</text>

  <!-- Arrows (onder de boxen tekenen) -->
  <!-- Browser -> API -->
  <line x1="242" y1="120" x2="326" y2="120" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="284" y="112" font-size="10.5" fill="#64748b" text-anchor="middle">HTTP/JSON · JWT</text>
  <!-- API -> Postgres -->
  <line x1="560" y1="120" x2="644" y2="120" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="602" y="112" font-size="10.5" fill="#64748b" text-anchor="middle">EF Core</text>
  <!-- API -> Python (verticaal) -->
  <line x1="443" y1="156" x2="443" y2="236" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="453" y="200" font-size="10.5" fill="#64748b" text-anchor="start">interne HTTP-call</text>
  <!-- Python -> Claude -->
  <line x1="405" y1="304" x2="330" y2="352" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="330" y="335" font-size="10.5" fill="#64748b" text-anchor="middle">extractie · chat</text>
  <!-- Python -> Voyage -->
  <line x1="481" y1="304" x2="560" y2="352" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="560" y="335" font-size="10.5" fill="#64748b" text-anchor="middle">embeddings</text>

  <!-- Browser -->
  <rect x="42" y="86" width="200" height="68" rx="10" fill="#f8fafc" stroke="#e6e8ec"/>
  <text x="58" y="116" font-size="13.5" font-weight="600" fill="#0f172a">React SPA</text>
  <text x="58" y="135" font-size="11" fill="#64748b">Vite · TypeScript · Tailwind</text>

  <!-- API (hub, accent) -->
  <rect x="326" y="86" width="234" height="68" rx="10" fill="#eaf1ff" stroke="#bcd0ff"/>
  <text x="344" y="116" font-size="13.5" font-weight="600" fill="#1d4ed8">ASP.NET Core Web API · .NET 8</text>
  <text x="344" y="135" font-size="11" fill="#3b6fd4">orchestrator · JWT-auth · multi-tenant</text>

  <!-- Postgres -->
  <rect x="644" y="86" width="186" height="68" rx="10" fill="#f8fafc" stroke="#e6e8ec"/>
  <text x="660" y="116" font-size="13.5" font-weight="600" fill="#0f172a">PostgreSQL 16</text>
  <text x="660" y="135" font-size="11" fill="#64748b">+ pgvector (embeddings)</text>
  <text x="644" y="174" font-size="10" fill="#64748b">tenant-geïsoleerd · EF query filter</text>

  <!-- Python -->
  <rect x="326" y="236" width="234" height="68" rx="10" fill="#f8fafc" stroke="#e6e8ec"/>
  <text x="344" y="266" font-size="13.5" font-weight="600" fill="#0f172a">Python FastAPI</text>
  <text x="344" y="285" font-size="11" fill="#64748b">AI-service: extractie · embeddings · chat</text>

  <!-- Claude -->
  <rect x="200" y="352" width="180" height="60" rx="10" fill="#f8fafc" stroke="#e6e8ec"/>
  <text x="216" y="380" font-size="13" font-weight="600" fill="#0f172a">Anthropic Claude</text>
  <text x="216" y="398" font-size="11" fill="#64748b">factuur-JSON · RAG-antwoord</text>

  <!-- Voyage -->
  <rect x="480" y="352" width="180" height="60" rx="10" fill="#f8fafc" stroke="#e6e8ec"/>
  <text x="496" y="380" font-size="13" font-weight="600" fill="#0f172a">Voyage AI</text>
  <text x="496" y="398" font-size="11" fill="#64748b">tekst → vectoren</text>
</svg>
